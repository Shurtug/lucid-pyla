# CPU inference: the YOLO-nano models run ~28-57 IPS on CPU (plenty for the bot) and
# free the GPU for the emulator. This stops the AMD driver stall crash (myBlobMmioRead /
# uCountStall) caused by the bot's DirectML + LDPlayer + scrcpy all hammering the GPU.
# Set back to "auto" for GPU inference if you'd rather have the speed.
cpu_or_gpu = "cpu"
gpu_device_id = 0
max_ips = "auto"
# Run entity detection for the next frame in a worker thread while the main
# thread processes the current one (ONNX releases the GIL). ~2x iteration rate
# on CPU inference for one frame of extra decision latency. Set false to disable.
pipeline_inference = true
# scrcpy capture. Lower max_width = lighter/steadier stream on flaky emulators
# (fixes LDPlayer freezes + native decode crashes). 0 = full native res (1920).
# Detection uses 640px internally, so 1280 is visually identical for the model.
scrcpy_max_width = 1280
scrcpy_bitrate = 4000000
trophies_multiplier = 1
run_for_minutes = 0
emulator_port = 5037
api_base_url = "default"
brawl_stars_package = "com.supercell.brawlstars"
ocr_scale_down_factor = 0.8
used_threads = "auto"
player_tag = ""
default_trophy_target = 1000
auto_load_queue_on_startup = true
play_order = "in_order"
